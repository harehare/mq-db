<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Database cylinder body -->
  <rect x="18" y="30" width="64" height="46" rx="4" fill="#B3402C"/>

  <!-- Cylinder top ellipse -->
  <ellipse cx="50" cy="30" rx="32" ry="10" fill="#B3402C"/>

  <!-- Cylinder shelf lines -->
  <ellipse cx="50" cy="44" rx="32" ry="7" fill="none" stroke="#FAF6EF" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="50" cy="56" rx="32" ry="7" fill="none" stroke="#FAF6EF" stroke-width="1.5" opacity="0.32"/>

  <!-- Bottom ellipse cap -->
